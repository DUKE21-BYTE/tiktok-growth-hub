<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Completed Order Generator</title>
  
  
  <!-- SEO & Open Graph Tags -->
  <meta name="robots" content="index, follow" />
  <meta name="keywords" content="Buy TikTok Followers Kenya, TikTok Views M-Pesa, TikTok Likes, TikTok Growth Agency Nairobi, TokGrow" />
  <link rel="canonical" href="https://tokgrow.co.ke/completed-order.html" />
  <meta property="og:title" content="TokGrow | Buy TikTok Followers Kenya & Boost Organic Views" />
  <meta property="og:description" content="Explode your TikTok presence safely. We offer 100% secure, algorithmic TikTok growth services in Kenya. No passwords required." />
  <meta property="og:image" content="https://tokgrow.co.ke/icon-512.png" />
  <meta property="og:url" content="https://tokgrow.co.ke/completed-order.html" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="TokGrow | TikTok Growth Agency Kenya" />
  <meta name="twitter:description" content="Secure, algorithmic TikTok growth services in Kenya." />
  <meta name="twitter:image" content="https://tokgrow.co.ke/icon-512.png" />

  <!-- Tailwind CSS via CDN -->
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- html-to-image for better modern CSS/SVG compatibility -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #000000;
      color: #ffffff;
    }
    
    /* Make contenteditable look normal but editable */
    [contenteditable="true"] {
      outline: none;
      border-bottom: 1px dashed rgba(255,255,255,0.2);
      transition: border-color 0.2s;
    }
    [contenteditable="true"]:focus {
      border-bottom: 1px dashed rgba(255,255,255,0.8);
      background-color: rgba(255,255,255,0.05);
      border-radius: 4px;
    }

    /* TikTok specific styling */
    .tiktok-card {
      background-color: #252525;
      border-radius: 8px;
    }
    
    .divider {
      height: 1px;
      background-color: #333333;
      margin: 20px 0;
    }

    .info-icon {
      width: 14px;
      height: 14px;
      color: #888888;
      display: inline-block;
      margin-left: 6px;
      vertical-align: text-top;
    }

    /* Hide tools during capture */
    .no-capture {
      display: flex !important;
    }
    .capturing .no-capture {
      display: none !important;
    }
  </style>
</head>
<body class="flex justify-center min-h-screen bg-zinc-900">

  <!-- Authentication Overlay -->
  <div id="auth-overlay" class="fixed inset-0 z-50 flex items-center justify-center bg-zinc-950 px-4">
    <div class="bg-zinc-900 border border-zinc-800 p-6 rounded-2xl w-full max-w-sm shadow-2xl">
      <h2 class="text-xl font-bold text-white mb-2 text-center">Protected Route</h2>
      <p class="text-zinc-400 text-sm mb-6 text-center">Enter the admin PIN to access the generator.</p>
      <input type="password" id="pin-input" placeholder="Enter PIN (1234)" class="w-full bg-zinc-950 border border-zinc-800 text-white rounded-xl px-4 py-3 mb-4 text-center text-lg tracking-[0.2em] focus:outline-none focus:border-cyan-500">
      <button id="btn-login" class="w-full bg-cyan-500 hover:bg-cyan-400 text-black font-bold py-3 rounded-xl transition-colors">Access Generator</button>
      <p id="auth-error" class="text-red-400 text-xs text-center mt-3 hidden">Incorrect PIN.</p>
    </div>
  </div>

  <!-- Main App (Hidden until auth) -->
  <div id="app-container" class="hidden flex-col items-center w-full max-w-md bg-black relative pb-20">
    
    <!-- Capture Area -->
    <div id="capture-area" class="w-full bg-[#0a0a0a] min-h-screen flex flex-col">
      
      <!-- Header -->
      <div class="flex items-center justify-between px-4 py-4 border-b border-black">
        <i data-lucide="arrow-left" class="text-white w-6 h-6"></i>
        <h1 class="text-lg font-bold text-white tracking-wide">Order details</h1>
        <i data-lucide="home" class="text-white w-6 h-6"></i>
      </div>

      <div class="p-4 flex-1">
        <!-- Promotion results -->
        <h2 class="text-base font-bold text-white flex items-center mb-4">
          Promotion results <i data-lucide="info" class="info-icon"></i>
        </h2>

        <div class="grid grid-cols-2 gap-3 mb-5">
          <div class="tiktok-card p-4">
            <p class="text-[13px] text-zinc-400 mb-1 font-medium">New followers</p>
            <p class="text-3xl font-bold text-white" contenteditable="true" spellcheck="false">2,567</p>
          </div>
          <div class="tiktok-card p-4">
            <p class="text-[13px] text-zinc-400 mb-1 font-medium">Video views</p>
            <p class="text-3xl font-bold text-white" contenteditable="true" spellcheck="false">13,465</p>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <p class="text-[13px] text-zinc-400 mb-0.5 font-medium">Ad cost</p>
            <p class="text-base font-bold text-white" contenteditable="true" spellcheck="false">$5.96</p>
          </div>
          <div>
            <p class="text-[13px] text-zinc-400 mb-0.5 font-medium">Time spent</p>
            <p class="text-base font-bold text-white" contenteditable="true" spellcheck="false">3 days</p>
          </div>
        </div>

        <div class="divider"></div>

        <!-- Engagement data -->
        <h2 class="text-base font-bold text-white flex items-center mb-4">
          Engagement data <i data-lucide="info" class="info-icon"></i>
        </h2>

        <div class="grid grid-cols-2 gap-y-5 gap-x-3">
          <div>
            <p class="text-[13px] text-zinc-400 mb-0.5 font-medium">Profile views</p>
            <p class="text-base font-bold text-white" contenteditable="true" spellcheck="false">268</p>
          </div>
          <div>
            <p class="text-[13px] text-zinc-400 mb-0.5 font-medium">Likes</p>
            <p class="text-base font-bold text-white" contenteditable="true" spellcheck="false">2,539</p>
          </div>
          <div>
            <p class="text-[13px] text-zinc-400 mb-0.5 font-medium">Shares</p>
            <p class="text-base font-bold text-white" contenteditable="true" spellcheck="false">2</p>
          </div>
          <div>
            <p class="text-[13px] text-zinc-400 mb-0.5 font-medium">Clicks</p>
            <p class="text-base font-bold text-white" contenteditable="true" spellcheck="false">2</p>
          </div>
        </div>

        <div class="divider"></div>

        <!-- Lead data -->
        <h2 class="text-base font-bold text-white flex items-center mb-4">
          Lead data <i data-lucide="info" class="info-icon"></i>
        </h2>

        <div class="flex justify-between items-center">
          <p class="text-[13px] text-zinc-400 font-medium">Total conversations</p>
          <p class="text-base font-bold text-white" contenteditable="true" spellcheck="false">46</p>
        </div>

      </div>
    </div>

    <!-- Floating Action Toolbar (Excluded from screenshot) -->
    <div class="no-capture fixed bottom-6 left-1/2 -translate-x-1/2 flex items-center gap-3 bg-zinc-900 border border-zinc-800 p-2 rounded-full shadow-2xl z-40">
      <button id="btn-download" class="flex items-center gap-2 bg-gradient-to-r from-cyan-500 to-pink-500 hover:opacity-90 text-white font-bold py-3 px-6 rounded-full transition-all text-sm shadow-lg">
        <i data-lucide="download" class="w-4 h-4"></i> Download Image
      </button>
      <button id="btn-reset" class="flex items-center gap-2 bg-zinc-800 hover:bg-zinc-700 text-white font-bold py-3 px-4 rounded-full transition-all text-sm" title="Reset Values">
        <i data-lucide="rotate-ccw" class="w-4 h-4"></i>
      </button>
    </div>

  </div>

  <script>
    // Initialize Icons
    lucide.createIcons();

    // Authentication Logic
    const VALID_PIN = '1234';
    const authOverlay = document.getElementById('auth-overlay');
    const appContainer = document.getElementById('app-container');
    const pinInput = document.getElementById('pin-input');
    const btnLogin = document.getElementById('btn-login');
    const authError = document.getElementById('auth-error');

    // Check sessionStorage
    if (sessionStorage.getItem('adminAuth') === 'true') {
      authOverlay.classList.add('hidden');
      appContainer.classList.remove('hidden');
      appContainer.classList.add('flex');
    }

    function attemptLogin() {
      if (pinInput.value === VALID_PIN) {
        sessionStorage.setItem('adminAuth', 'true');
        authOverlay.classList.add('hidden');
        appContainer.classList.remove('hidden');
        appContainer.classList.add('flex');
      } else {
        authError.classList.remove('hidden');
        pinInput.value = '';
        pinInput.focus();
      }
    }

    btnLogin.addEventListener('click', attemptLogin);
    pinInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') attemptLogin();
    });

    // Capture & Download Logic
    document.getElementById('btn-download').addEventListener('click', () => {
      const captureArea = document.getElementById('capture-area');
      const container = document.getElementById('app-container');
      
      // Add capturing class to hide toolbar and styling outlines
      container.classList.add('capturing');
      
      // Temporarily remove dashed borders from contenteditable
      const editables = document.querySelectorAll('[contenteditable="true"]');
      editables.forEach(el => el.style.borderBottom = 'none');

      htmlToImage.toPng(captureArea, {
        backgroundColor: '#0a0a0a',
        pixelRatio: 2 // High resolution
      })
      .then(function (dataUrl) {
        // Restore dashed borders
        editables.forEach(el => el.style.borderBottom = '');
        container.classList.remove('capturing');

        // Trigger download
        const link = document.createElement('a');
        link.download = `tiktok-results-${new Date().getTime()}.png`;
        link.href = dataUrl;
        link.click();
      })
      .catch(function (error) {
        console.error("Screenshot failed:", error);
        alert("Failed to capture image. Please try again.");
        editables.forEach(el => el.style.borderBottom = '');
        container.classList.remove('capturing');
      });
    });

    // Reset Logic
    document.getElementById('btn-reset').addEventListener('click', () => {
      if(confirm('Reset all values to default?')) {
        location.reload();
      }
    });
  </script>
</body>
</html>
